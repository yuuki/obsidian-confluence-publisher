name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
      - run: git diff --exit-code -- main.js
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
